<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container row between center">
        <a class="brand" href="index.html">SiteDoctor Demo Store</a>
        <div class="row gap-sm wrap">
          <span id="userBadge" class="badge">Checking session...</span>
          <a class="btn btn-ghost" href="index.html">View store</a>
          <button id="logoutBtn" class="btn btn-danger" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container dashboard-grid">
        <section class="card">
          <div class="row between center">
            <div>
              <h2 id="formTitle">Add product</h2>
              <p class="muted">Create or update products that appear on the public page.</p>
            </div>
            <button id="seedDemoBtn" class="btn btn-ghost" type="button">Add demo product</button>
          </div>

          <form id="productForm" class="stack-md top-gap">
            <input id="productId" type="hidden" />

            <label>
              <span>Title</span>
              <input id="title" type="text" placeholder="Wireless Headphones" required />
            </label>

            <label>
              <span>Description</span>
              <textarea id="description" rows="4" placeholder="Short product description" required></textarea>
            </label>

            <label>
              <span>Current image URL (optional)</span>
              <input id="existingImageUrl" type="url" placeholder="https://..." />
            </label>

            <label>
              <span>Upload new image (optional)</span>
              <input id="imageFile" type="file" accept="image/*" />
            </label>

            <div class="row gap-sm wrap">
              <button id="saveBtn" class="btn" type="submit">Save product</button>
              <button id="cancelEditBtn" class="btn btn-ghost hidden" type="button">Cancel edit</button>
            </div>
          </form>

          <div id="dashboardMessage" class="notice hidden top-gap"></div>
        </section>

        <section class="card">
          <div class="row between center">
            <div>
              <h2>Products list</h2>
              <p class="muted">Edit or delete any product.</p>
            </div>
            <button id="refreshDashboardBtn" class="btn btn-ghost" type="button">Refresh</button>
          </div>

          <div id="dashboardProducts" class="dashboard-products top-gap"></div>
        </section>
      </div>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
