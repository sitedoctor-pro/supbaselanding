<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Store Front</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container row between center">
        <a class="brand" href="index.html">SiteDoctor Demo Store</a>
        <nav class="nav">
          <a class="btn btn-ghost" href="login.html">Dashboard Login</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-grid">
          <div>
            <span class="badge">Simple landing + dashboard</span>
            <h1>Manage your store products from one protected dashboard.</h1>
            <p>
              Products below are loaded from Supabase. Add, edit, or delete them
              from the dashboard after login.
            </p>
            <div class="hero-actions">
              <a class="btn" href="login.html">Go to dashboard</a>
              <a class="btn btn-ghost" href="#products">View products</a>
            </div>
          </div>
          <div class="hero-card">
            <img src="product-sample.svg" alt="Demo product" />
          </div>
        </div>
      </section>

      <section id="products" class="section">
        <div class="container">
          <div class="section-head row between center">
            <div>
              <span class="muted">Products</span>
              <h2>Latest products</h2>
            </div>
            <button id="refreshProductsBtn" class="btn btn-ghost" type="button">Refresh</button>
          </div>

          <div id="statusMessage" class="notice hidden"></div>
          <div id="productsGrid" class="products-grid"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
